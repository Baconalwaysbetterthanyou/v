version: '3.8'

services:
  # MySQL 8.0 - Industry-standard relational database
  mysql:
    image: mysql:8.0
    container_name: w4-mysql
    environment:
      MYSQL_ROOT_PASSWORD: learning123
      MYSQL_DATABASE: contacts_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-plearning123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL 15 - Advanced open-source database
  postgres:
    image: postgres:15
    container_name: w4-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: learning123
      POSTGRES_DB: contacts_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgresql:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # phpMyAdmin - Web interface for MySQL
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: w4-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: learning123
    ports:
      - "8080:80"
    depends_on:
      - mysql

  # pgAdmin - Web interface for PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: w4-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: learning123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8081:80"
    depends_on:
      - postgres

volumes:
  mysql_data:
  postgres_data:

# ================================================
# USAGE INSTRUCTIONS
# ================================================
#
# Start all databases:
#   docker-compose up -d
#
# Access MySQL CLI:
#   docker exec -it w4-mysql mysql -u root -plearning123 contacts_db
#
# Access PostgreSQL CLI:
#   docker exec -it w4-postgres psql -U postgres contacts_db
#
# Access MySQL Web UI:
#   Open browser: http://localhost:8080
#
# Access PostgreSQL Web UI:
#   Open browser: http://localhost:8081
#   Server: postgres
#   Username: postgres
#   Password: learning123
#
# Stop all databases:
#   docker-compose down
#
# Reset all data:
#   docker-compose down -v
#
# ================================================
